<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .header { background-color: #4F46E5; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; margin: -20px -20px 20px -20px; }
        .footer { font-size: 0.9em; color: #666; margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        .button { display: inline-block; padding: 10px 20px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Xác nhận Đăng ký Workshop</h2>
        </div>
        
        <p>Chào <strong>{{fullName}}</strong>,</p>
        
        <p>Chúc mừng bạn đã đăng ký thành công workshop <strong>{{workshopTitle}}</strong>.</p>
        
        <p><strong>Thông tin chi tiết:</strong></p>
        <ul>
            <li><strong>Thời gian:</strong> {{startsAt}}</li>
        </ul>
        
        <p>Vui lòng xuất trình mã QR đính kèm hoặc trên ứng dụng UniHub để điểm danh khi tham gia.</p>
        
        <div class="footer">
            <p>Trân trọng,<br>Đội ngũ UniHub</p>
        </div>
    </div>
</body>
</html>
